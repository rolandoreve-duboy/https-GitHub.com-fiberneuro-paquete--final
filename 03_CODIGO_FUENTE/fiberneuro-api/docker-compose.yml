version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: fiberneuro_db
    environment:
      POSTGRES_DB: fiberneuro
      POSTGRES_USER: fiberneuro_user
      POSTGRES_PASSWORD: fiberneuro_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fiberneuro_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: fiberneuro_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://fiberneuro_user:fiberneuro_pass@db:5432/fiberneuro
      - API_PORT=8000
      - DEBUG=False
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
