name: fiberneuro_campo
description: Aplicación móvil FiberNeuro para técnicos en campo.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP
  http: ^1.1.0
  dio: ^5.3.0
  
  # State Management
  provider: ^6.0.0
  
  # Storage
  shared_preferences: ^2.2.0
  sqflite: ^2.3.0
  
  # UI
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  
  # Logging
  logger: ^2.0.0
  
  # Authentication
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Localization
  generate: true
